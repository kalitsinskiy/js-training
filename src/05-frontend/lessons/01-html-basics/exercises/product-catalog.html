<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Secret Santa — Gift Catalog</title>
</head>
<body>

  <!--
    TODO: Build a product catalog page for gift ideas.

    Requirements:

    1. HEADER
       - Add a <header> element containing:
         a) An <h1> with text "Secret Santa"
         b) A <nav> with an unordered list of links:
            - "Home" (href="#")
            - "Catalog" (href="#")
            - "My Wishlist" (href="#")
            - "My Room" (href="#")

    2. MAIN CONTENT
       - Add a <main> element
       - Inside it, add an <h2> with text "Gift Ideas"
       - Add a <section> that will contain product cards
       - Create at least 4 product cards, each as an <article> element
       - Each <article> must contain:
         a) An <img> with:
            - src="https://via.placeholder.com/300x200" (or any placeholder)
            - Descriptive alt text (e.g., "Wireless headphones")
            - width="300" and height="200"
         b) An <h3> with the product name
         c) A <p> with a short description
         d) A <p> with the price (e.g., "$24.99") — use <strong> for the price
         e) A <button> with text "Add to Wishlist"
         f) A data-product-id attribute on the <article> (e.g., data-product-id="1")

    3. FOOTER
       - Add a <footer> element
       - Include a <p> with copyright text

    4. PRODUCT IDEAS (use these or come up with your own):
       - Wireless Headphones — $29.99
       - Cozy Blanket — $24.99
       - Coffee Mug Set — $19.99
       - Board Game — $34.99
       - Scented Candle Pack — $14.99
       - Gourmet Chocolate Box — $22.99

    Hints:
    - Use <article> for each product — it is self-contained content
    - The <section> groups all the product articles together
    - Remember: every <img> needs an alt attribute (even alt="" if decorative)
    - Use data-* attributes to store product IDs for later JavaScript use
    - Look at examples/semantic-page.html for header/nav/main/footer structure

    Verify (when you finish, check each item):
    [ ] Page has exactly ONE <h1> ("Secret Santa")
    [ ] <nav> contains a <ul> with 4 <li><a> entries
    [ ] <main> wraps the catalog content
    [ ] At least 4 <article> elements, one per product
    [ ] Each <article> has data-product-id="…" with a unique value
    [ ] Every <img> has src, alt (descriptive), width, height
    [ ] Each product has <h3> name, <p> description, <p> with <strong> for price
    [ ] Each product has a <button> "Add to Wishlist"
    [ ] <footer> has a <p> with copyright text
    [ ] Open in a browser — page looks reasonable (no rendering errors)
    [ ] Optional: paste source into https://validator.w3.org/ — should pass
  -->

</body>
</html>
